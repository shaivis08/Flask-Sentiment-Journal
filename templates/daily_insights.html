{% extends "base.html" %}

{% block head %}
{% endblock %}

{% block body %}
<div class="insight-page-wrapper">
    <header class="insight-header">
        <h1>Daily Insight</h1>
        <p class="date-subtitle">{{ entry_for_insight.date_created.strftime('%A, %d %B %Y') }}</p>
    </header>

    <div class="insight-card">
        <div class="card-decoration"></div>
        <div class="mentor-note">
            <h2 class="insight-title">The Daily Bud</h2>
            <div class="insight-text">
                {{ insight|safe }}
            </div>
        </div>
        
        <div class="action-footer">
            <a href="{{ url_for('contents') }}" class="btn-back">
                &larr; Back to Dashboard
            </a>
        </div>
    </div>
</div>
{% endblock %}
